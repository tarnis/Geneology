  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f2ece0;
      color: #2c1810;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #2c1810;
      color: #f5f0e8;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      z-index: 10;
    }
    header .star { font-size: 20px; }
    header h1 { font-size: 18px; letter-spacing: 0.5px; flex: 1; }
    header .sub { font-size: 12px; color: #c4956a; font-family: sans-serif; }
    header .built { font-size: 11px; color: #8b6049; font-family: sans-serif; }

    .app { display: flex; flex: 1; overflow: hidden; }

    .sidebar {
      width: 270px;
      background: #3d2412;
      color: #f5f0e8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-top {
      padding: 10px;
      border-bottom: 1px solid #5a3820;
    }
    .sidebar-top input {
      width: 100%;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid #8b6049;
      background: #2c1810;
      color: #f5f0e8;
      font-family: sans-serif;
      font-size: 13px;
    }
    .sidebar-top input::placeholder { color: #8b6049; }
    .sidebar-list { flex: 1; overflow-y: auto; }
    .gen-header {
      padding: 7px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #c4956a;
      background: #2c1810;
      font-family: sans-serif;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .person-item {
      padding: 9px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .person-item:hover { background: #5a3820; }
    .person-item.active { background: #7a4e30; border-left-color: #c4956a; }
    .pi-name { font-size: 13px; font-weight: bold; line-height: 1.3; }
    .pi-dates { font-size: 11px; color: #b08060; font-family: sans-serif; margin-top: 1px; }

    .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.09);
    }

    .dos-name { font-size: 26px; line-height: 1.2; color: #2c1810; margin-bottom: 4px; }
    .dos-aka  { font-size: 13px; color: #8b6049; font-family: sans-serif; margin-bottom: 3px; }
    .dos-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 11px;
      font-family: sans-serif;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .badge-gen         { background: #f2ece0; color: #5a3820; border: 1px solid #c4956a; }
    .badge-M           { background: #dbeafe; color: #1e3a5f; }
    .badge-F           { background: #fce7f3; color: #831843; }
    .badge-established { background: #d1fae5; color: #065f46; }
    .badge-possible    { background: #fef3c7; color: #92400e; }
    .badge-unverified  { background: #fee2e2; color: #991b1b; }

    .section-title {
      font-size: 11px;
      font-family: sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #8b6049;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ede5d8;
    }

    .keyline { height: 1px; background: #ede5d8; margin: 14px 0; }

    .quick-facts { display: flex; gap: 28px; flex-wrap: wrap; font-family: sans-serif; }
    .qf-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #8b6049; margin-bottom: 3px; }
    .qf-val   { font-size: 13px; color: #2c1810; font-family: Georgia, serif; }
    .qf-sub   { font-size: 11px; color: #8b8075; }

    .family-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .fam-card {
      background: #f8f3ec;
      border: 1px solid #e0d4c0;
      border-radius: 8px;
      padding: 10px 14px;
      min-width: 140px;
      max-width: 200px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .fam-card.clickable:hover { border-color: #c4956a; background: #f0e8dc; }
    .fam-card.no-link { cursor: default; opacity: 0.75; }
    .fam-role  { font-size: 10px; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.6px; color: #8b6049; margin-bottom: 3px; font-weight: 700; }
    .fam-name  { font-size: 13px; font-weight: bold; line-height: 1.3; }
    .fam-dates { font-size: 11px; color: #8b6049; font-family: sans-serif; margin-top: 2px; }

    .facts-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .facts-table th {
      text-align: left;
      font-family: sans-serif;
      font-size: 10px;
      font-weight: 800;
      color: #8b6049;
      padding: 7px 10px;
      background: #f8f3ec;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .facts-table td { padding: 9px 10px; border-top: 1px solid #f0e8e0; vertical-align: top; }
    .facts-table tr:hover td { background: #faf7f4; }
    .fact-field    { font-family: sans-serif; font-weight: 700; font-size: 11px; color: #3d2412; white-space: nowrap; }
    .fact-source   { font-size: 11px; color: #8b8075; margin-top: 3px; font-family: sans-serif; }
    .fact-doc-link { color: #1e5c8a; text-decoration: none; margin-left: 4px; font-weight: 600; white-space: nowrap; }
    .fact-doc-link:hover { text-decoration: underline; }
    .fact-note  { font-size: 12px; color: #5a3820; margin-top: 4px; font-style: italic; line-height: 1.4; }
    .fact-ark   { font-size: 11px; font-family: monospace; color: #1e5c8a; }
    .fact-link  { font-size: 11px; color: #1e5c8a; }

    .note-card {
      background: #fffdf5;
      border: 1px solid #e8ddd0;
      border-left: 4px solid #c4956a;
      border-radius: 5px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .note-date { font-family: sans-serif; font-size: 11px; color: #8b6049; font-weight: 700; margin-bottom: 5px; }
    .note-text { font-size: 13px; line-height: 1.65; white-space: pre-wrap; }

    .no-sel { text-align: center; padding: 80px 40px; color: #8b6049; }
    .no-sel h3 { font-size: 20px; margin-bottom: 8px; }
    .no-sel p { font-family: sans-serif; font-size: 14px; color: #9a8070; }

    .empty-note { font-style: italic; color: #9a8070; font-family: sans-serif; font-size: 13px; }
    .fs-link { display: inline-flex; align-items: center; gap: 4px; font-family: sans-serif; font-size: 12px; color: #1e5c8a; }

    a { color: #1e5c8a; text-decoration: none; }
    a:hover { text-decoration: underline; }

    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    ::-webkit-scrollbar-thumb { background: #8b6049; border-radius: 4px; }

ed behind in Russia temporarily.","verification_needed":["View original handwritten manifest image (Film 005262965, Image 704) to read the marital status column for Riwke Marcus's row — confirm 'Married' vs 'Single'","Read last-residence town from original image (col. 9 of 1903 manifest) — looking for Suwałki or Suwałki Gubernia","Read full contact address for Hersch Basenberg — looking for Brooklyn address"],"date_added":"2026-05-23","url":"https://www.familysearch.org/ark:/61903/1:1:JF3X-ZZX"},{"field":"residence","date":"1910","place":"Brooklyn Ward 26, Kings County, New York (Sheet B, Sheet 11) — with husband Benjamin Hiner and children Sidney (2) and Millie (0)","status":"established","source":"1910 US Federal Census, FamilySearch ARK 1:1:M54Z-YVX (Rebecca Hiner, Wife, age 21, Russia). NARA T624, microfilm 1374991, image 257, Digital Folder 004972958.","notes":"Immigration year column not captured in FamilySearch index for Rebecca's row. Original image (microfilm 1374991, image 257) must be viewed to obtain her immigration year.","date_added":"2026-05-23","url":"https://www.familysearch.org/ark:/61903/1:1:M54Z-YVX"},{"field":"child_birth_record","description":"NYC Birth Certificate for son Sydney/Sidney Hiner — lists mother as 'Becky Marcus' (maiden surname), father as 'Bennie Hiner'","child_name":"Sydney Hiner","event_date":"24 March 1908","event_place":"Brooklyn, Kings, New York","father_on_cert":"Bennie Hiner","mother_on_cert":"Becky Marcus","source_details_number":"10674","status":"established","source":"New York, New York City Births, 1846-1909. FamilySearch ARK 1:1:2WZK-6F3. Digital Folder 004207184, Microfilm 1993077, Image 81.","significance":"CONFIRMS Beckie's maiden surname 'Marcus' still used on 1908 city documents, consistent with the 1907 marriage cert (which listed her as 'Beckie Markas'). Also fixes Sidney's exact birth date to 24 March 1908.","date_added":"2026-05-23","url":"https://www.familysearch.org/ark:/61903/1:1:2WZK-6F3"},{"field":"residence","date":"1920","place":"Brooklyn, Kings County, New York — Household 188, Assembly District 23, Enumeration District 1493 (head of household with husband Ben Hyner and four children)","status":"established","source":"1920 US Federal Census, FamilySearch ARK 1:1:MJT2-SZD (indexed as 'Becca Hyner'). Same record confirms mother Dora Marcus (ARK for Dora: 1:1:MJT2-SZD).","date_added":"2026-05-23","url":"https://www.familysearch.org/ark:/61903/1:1:MJT2-SZD"}],"research_notes":[{"date":"2026-05-22","session":"NYC marriage certificate session","summary":"Located and viewed NYC Marriage Certificate M-K-1907-0005761 (Kings/Brooklyn, 10 May 1907) via NYC Municipal Archives Historical Vital Records (a860-historicalvitalrecords.nyc.gov). Certificate was found via German Genealogy Group (GGG) brides index: 'Markas, Beckie — May 10, 1907 — Kings — Cert #5761'; groom lookup returned 'Honkofsky, Bennie — May 10, 1907 — Cert #5761 — Kings'. Certificate confirms: (1) Bride = Beckie Markas, age 20, birthplace Russia, resident 369 Sackman St Brooklyn; (2) Groom = Bennie Honkofsky, age 22, carpenter, birthplace Russia; (3) CRITICAL — bride's mother's maiden name = 'Dora Abromovitze' (= Dora Abramowitz) — CONFIRMS Dora's maiden name previously unknown; (4) bride's father = '[Leidny?] Markas' — first name ambiguous; (5) groom's father = Michel Honkofsky (= Michael Hiner, confirmed); (6) groom's mother = Goldy Litkofsky (= Goldie Litcofsky, confirmed); (7) witness 'K/H Abramowitz' — likely relative of Dora née Abramowitz."},{"date":"2026-05-21","session":"Suwalki PSA research session","summary":"Located probable birth record for Beckie Marcus in the Suwalki Jewish civil registry (1887). JRI-Poland legacy search for MARKUS/Phonetically-like in Suwalki Gubernia returned 267 records including 'MARKUS Riwka 1887 B 48' in Fond 204 (Suwalki PSA archive). Navigated to szukajwarchiwach.gov.pl and viewed scan 27 of unit 14210898 (ref code 63/204/0/1/56). Document confirmed: child named 'Рювка' (Rywka/Rivka), registered same day and consecutively with 'Abram Bejnes' (Akta 47, likely twin). Father identified from two in-document mentions as '[Яков] Абрамович Маркус' — first name reads as Yakov (Jacob/Yankel); patronymic Абрамович (son of Abraham/Abram) clearly legible. Father age ~49 in 1887, meshchanin of Suwalki."},{"date":"2026-05-21","topic":"Father's name confidence","note":"The father's first name appears in two places in the document: (1) the opening formula 'явился [NAME] Абрамовичу...' and (2) 'отец его [NAME] Абрамовичу сорока лет'. Both instances read as approximately 'Яков' (Yakov = Jacob). The patronymic 'Абрамович' is clearly legible. An alternate reading of 'Борух' (Boruch/Baruch) for the first name is possible but less supported. Image resolution at 42% zoom (szukajwarchiwach.gov.pl viewer) limits certainty. Recommend ordering high-resolution scan via 'Order larger format' on szukajwarchiwach.gov.pl or contacting Archiwum Państwowe w Suwałkach directly."},{"date":"2026-05-21","topic":"Date discrepancy (1887 vs 1888)","note":"The Suwalki birth register gives 9 March 1887 (Julian calendar) = 21 March 1887 (Gregorian). SSDI gives 5 March 1888. A one-year discrepancy is extremely common in Ashkenazi immigration records — years were often misrecalled or shifted. The name, place, and surname match strongly support this being the correct Beckie Marcus. Recommend checking if there is also an 1888 Riwka Markus birth in the same archive to rule out a later sibling."},{"date":"2026-05-21","topic":"Dora Marcus — mother","note":"Dora Marcus (b. ~1860) is Beckie's probable mother per GEDCOM and 1920 census data. Dora Marcus ship manifest not found — searched Ellis Island 1905-1912 via Steve Morse Gold and White forms with no matches for a ~48-year-old woman from Russia. May have arrived under a maiden name, via a non-NY port, or the 1908 immigration year from the 1920 census may be inaccurate."},{"date":"2026-05-23","topic":"1920 US CENSUS — Full household confirmed — FamilySearch ARK 1:1:MJT2-SZD","note":"1920 US Federal Census (NARA T625, microfilm 1821182, image 255): Beckie appears as 'Becca Hyner', age 33, Female, Russia, Married, Wife (to head Ben Hyner). Brooklyn, Kings County, Assembly District 23, ED 1493, Household 188. Her birth year 1887 (from age 33 in 1920) matches Akta 48 exactly. Ben Hyner (husband, Head): M, 34, Russia, arrived 1902 — NOTE: this is 2 years earlier than the SS Pennsylvania manifest (2 Jan 1904) previously identified for 'Benjamin Hiner'; the 1920 census year (1902) may be a self-report error, or the 1904 manifest may be a different person. CHILDREN IN 1920 HOUSEHOLD: (1) Sidney Hyner, M, 11, New York (born ~1909); (2) Mildred Hyner, F, 10, New York (born ~1910); (3) Beatrice Hyner, F, 8, New York (born ~1912); (4) Israel Hyner, M, 3 years 1 month, New York (born ~late 1916/early 1917). Mother-in-law: Dora Marcus (F, 60, Russia, widowed, arrived 1908)."},{"date":"2026-05-23","session":"1910 census and NYC Births session","summary":"Located 1910 US Census household for Benjamin Hiner (head, ARK 1:1:M54Z-YV6) and Rebecca Hiner (wife, ARK 1:1:M54Z-YVX) in Brooklyn Ward 26. Benjamin born 1886 Russia (consistent with prior records); Rebecca born ~1889 Russia, age 21. Children in 1910: Sidney (M, 2, NY) and Millie (F, 0, NY). Immigration year for Rebecca NOT indexed in FamilySearch — requires viewing microfilm 1374991 image 257 to determine. FamilySearch tree person for Rebecca: GCN1-M18. FamilySearch tree person for Benjamin: GCN1-8ZQ. ALSO: Discovered NYC birth certificate for Sidney Hiner (ARK 1:1:2WZK-6F3, dated 24 March 1908, Brooklyn). Mother listed as 'Becky Marcus' — confirms maiden surname still used in 1908 official documents. Father listed as 'Bennie Hiner'. Source detail number 10674. FamilySearch tree shows all 4 children: Sidney (GCN1-4FL), Millie (GCN1-FQJ), Beatrice (GLVT-52V), Irving (GB7P-YSN)."},{"date":"2026-05-23","session":"Ship manifest search session","summary":"Searched exhaustively for Beckie Marcus's ship manifest under all spelling variants (Rivka/Rywka/Riwka/Rifke/Rebecca + Markus/Marcus/Markas, female, age 13-22, arrival 1900-1907) via Steve Morse White form (all ports) and JewishGen EIDB (Ellis Island). BEST CANDIDATE IDENTIFIED: Riwke Marcus, Female, 18, Russia Hebrew, SS Roland, Hamburg → Ellis Island, 24 March 1905 (FamilySearch ARK 1:1:JF3X-ZZX, Film 005262965, Image 704, List 32). Contact person: Hersch Basenberg (indexed as 'Brother-In-Law'). Co-traveler: Hersch Marcus (Male, 28, Married, same contact) — likely Riwke's brother. KEY ISSUE: Index shows marital status as 'Married' — this is inconsistent with her 1907 marriage to Benjamin Honkofsky (which would be her first marriage). Likely explanations: (1) indexer error (S misread as M); or (2) she was briefly married/widowed in Russia before 1905. The 'Brother-In-Law' contact (Hersch Basenberg) is consistent with a sister (née Marcus) who married Basenberg and emigrated earlier. ORIGINAL IMAGE VERIFICATION REQUIRED to resolve the 'Married' question. Last Residence (town of origin) was NOT indexed for this collection — must be read from the original image."},{"date":"2026-05-23","topic":"Hersch Basenberg — contact person on Riwke Marcus manifest","note":"Hersch Basenberg appears as contact person for BOTH Riwke Marcus (Female, 18) AND Hersch Marcus (Male, 28) on the 24 March 1905 SS Roland manifest. The relationship code 'Br I L' (Brother-In-Law) describes Hersch Basenberg's relationship to the immigrant(s). This strongly implies: (1) Riwke has a sister who married Hersch Basenberg and lives in the US; (2) Hersch Marcus is likely Riwke's brother, and Hersch Basenberg is therefore Hersch Marcus's brother-in-law through their common sister. If so, Riwke was SINGLE in 1905 (going to join her married sister), and the 'Married' status in the index is likely an error. NEXT STEP: Search NYC vital records and the 1905-1910 US Census for 'Mrs. Basenberg née Marcus' or 'Hersch/Herman/Henry Basenberg' in Brooklyn/New York — this could confirm the Marcus family network."},{"date":"2026-05-23","topic":"Next steps — UPDATED 2026-05-23 (post manifest search)","note":"PRIORITY 1 (CRITICAL): View original manuscript image for the Riwke Marcus manifest — Film 005262965, Image 704 (FamilySearch film viewer). Read: (a) marital status column for her row; (b) last-residence/town column; (c) full contact address for Hersch Basenberg. This resolves the 'Married' question and may confirm Suwałki origin. PRIORITY 2: View microfilm 1374991 image 257 to read Rebecca Hiner's immigration year from the 1910 census original. PRIORITY 3: Search for Hersch/Herman Basenberg in NYC records 1900-1920 (Brooklyn) — likely married to a Marcus sister; would confirm the family network. PRIORITY 4: Confirm Ben Hyner = Benjamin Honkofsky — reconcile 1920 census arrival 1902 vs. SS Pennsylvania 1904. PRIORITY 5: Order high-quality scan of NYC Marriage Cert 5761 to read bride's father's first name. PRIORITY 6: Order high-res scan of Suwalki PSA Akta 48. PRIORITY 7: Search 1930 census and 1925 NY State census for Beckie Hyner (already in FamilySearch tree). PRIORITY 8: Find death record for Yakov/Jacob Markus (died before January 1920, Brooklyn)."}],"rejected_records":[{"description":"Multiple 'Dora Marcus' results in Steve Morse Ellis Island Gold form (1906-1910), female, ages 11 and 18 — too young for mother b. 1860","status":"rejected","date":"2026-05-21"}],"last_updated":"2026-05-23 (manifest search complete)","familysearch_tree_id":"GCN1-M18","generation":3},"I6000000043681525821":{"id":"I6000000043681525821","gedcom_xref":"@I6000000043681525821@","schema_version":1,"names":["Ida Flaxman","Ida Hyner"],"sex":"F","relationships":{"parents":[{"id":"I6000000078496084915","name":"Mordechai Flaksman"},{"id":"I6000000080839712368","name":"Jennie Dickstein Kaufman"}],"spouses":[{"id":"I6000000043711578108","name":"Irving Hyner"}],"children":[{"id":"I6000000001814601273","name 1900-1915 — all candidates evaluated and rejected).","status":"probable","source":"1920 US Census, Household 188, Brooklyn AD 23 ED 1493, Kings, NY — FamilySearch ARK 1:1:MJT2-SZD, NARA T625, microfilm 1821182, image 255","date_added":"2026-05-21","date_updated":"2026-05-23","url":"https://www.familysearch.org/ark:/61903/1:1:MJT2-SZD"},{"field":"residence","date":"1920","place":"Brooklyn, Kings County, New York — Household 188, Assembly District 23, Enumeration District 1493 (with daughter Becca Hyner and son-in-law Ben Hyner)","status":"established","source":"1920 US Federal Census, FamilySearch ARK 1:1:MJT2-SZD, NARA T625, microfilm 1821182, image 255. FamilySearch Digital Folder 004966678.","date_added":"2026-05-23","url":"https://www.familysearch.org/ark:/61903/1:1:MJT2-SZD"},{"field":"marital_status","value":"Widowed","date":"BY 1920","description":"Dora was recorded as Widowed in the 1920 US Census, establishing that her husband (Yakov/Jacob Markus) had died before January 1920. Date of husband's death unknown.","status":"established","source":"1920 US Census (FamilySearch ARK 1:1:MJT2-SZD)","date_added":"2026-05-23","url":"https://www.familysearch.org/ark:/61903/1:1:MJT2-SZD"}],"research_notes":[{"date":"2026-05-22","topic":"MAIDEN NAME CONFIRMED — Abramowitz — from marriage certificate","note":"NYC Marriage Certificate M-K-1907-0005761 (Kings/Brooklyn, 10 May 1907): daughter Beckie Markas married Bennie Honkofsky. The 'Mother's Maiden Name' field for the bride reads 'Dora Abromovitze' — confirming Dora's first name and her maiden surname as Abramowitz (Abromovitz). Certificate source: NYC Municipal Archives Historical Vital Records, a860-historicalvitalrecords.nyc.gov/view/8145195. This is a PRIMARY SOURCE confirmation. The maiden name Abramowitz was previously unknown; this opens new ship manifest search strategies (search 'Dora Abramowitz' / 'Dvorah Abramowitz' from Suwałki, ~1905-1912) and Suwalki PSA searches for the Abramowitz family."},{"date":"2026-05-22","topic":"Witness signature — possible Abramowitz relative","note":"One of the two witnesses to the Beckie Marcus/Benjamin Honkofsky marriage (cert 5761, Kings, 1907) signed with the surname 'Abramowitz' (possibly 'K. Abramowitz' or 'H. Abramowitz' — first initial unclear). Given that Dora's maiden name was Abramowitz, this witness is likely a relative of Dora's (a sibling, cousin, or other family member). This corroborates the maiden name reading and suggests the Abramowitz family had emigrated to Brooklyn by 1907."},{"date":"2026-05-22","topic":"Bride's father's name — marriage certificate reading ambiguous","note":"The 'Father's Name' field for the bride on cert 5761 reads '[Leidny?] Markas' — the first name is not clearly legible at available image resolution. Matthew (user) reads it as 'Leidny'; alternate reading 'Cidny' was also considered. Neither 'Leidny' nor 'Cidny' is an obvious Ashkenazi name. Possible identifications: (1) 'Leiby/Leiby' (diminutive of Leib/Lev); (2) 'Leizer' (Eliezer); (3) a cursive form of 'Yankel' (Yakov/Jacob) that has been misread; (4) an entirely different name from 'Yakov'. The surname 'Markas' (= Markus) is clearly legible, confirming this refers to Beckie's father. The Suwalki PSA Akta 48 independently names the father as 'Yakov Abramovitch Markus' — reconciliation of the first name requires a high-quality scan of the marriage certificate."},{"date":"2026-05-21","topic":"Ship manifest search — Ellis Island, 1905-1912 — now superseded","note":"Earlier search for 'Dora Marcus' on Ellis Island (Steve Morse Gold/White forms) returned no matches for woman born ~1860. This search is now superseded — maiden name Abramowitz was unknown at time of search. NEW search target: 'Dora Abramowitz' or 'Dvorah Abramowitz', female, ~age 45-55, from Russia/Suwałki, 1905-1912. Also search Boston, Philadelphia, Baltimore, and Canadian ports. The 1907 Abramowitz witness at Beckie's marriage suggests Dora's family (Abramowitz) had arrived in Brooklyn before mid-1907."},{"date":"2026-05-21","topic":"Mother's name in Akta 48","note":"The Suwalki PSA birth register 1887, Akta 48 (Beckie/Riwka's birth record) states the father presented himself and 'his lawful wife' (законная жена его) bore the child. The wife's name should appear in the document formula but has not been confirmed from the scan at 42% zoom. A high-resolution scan may confirm 'Dora' (or her Yiddish equivalent Dvorah/Deina) as the wife's name."},{"date":"2026-05-23","topic":"1920 US CENSUS CONFIRMED — Full household details — FamilySearch ARK 1:1:MJT2-SZD","note":"1920 US Federal Census (NARA T625, microfilm 1821182, image 255; FamilySearch Digital Folder 004966678): Dora Marcus, age 60, Female, White, Widowed, Mother-in-law, birthplace Russia, father's birthplace Russia, mother's birthplace Russia, immigration 1908. Brooklyn, Kings County, Assembly District 23, Enumeration District 1493, Household 188, Line 13 (or 14 — see image), Sheet A, Sheet 11. The record is already attached in the FamilySearch Family Tree to person ID GLVT-1K2. FULL HOUSEHOLD: (1) Ben Hyner (Head, M, 34, Russia, arrived 1902, married); (2) Becca Hyner (Wife, F, 33, Russia — = Beckie Marcus, born 1887 per Akta 48); (3) Sidney Hyner (Son, M, 11, New York — born ~1909); (4) Mildred Hyner (Daughter, F, 10, New York — born ~1910); (5) Beatrice Hyner (Daughter, F, 8, New York — born ~1912); (6) Israel Hyner (Son, M, 3y1m, New York — born ~late 1916/early 1917); (7) Dora Marcus (Mother-in-law, F, 60, Russia, widowed, 1908). KEY NEW FINDINGS: (a) Dora was widowed by 1920 — Yakov/Jacob Markus died before January 1920; (b) both of Dora's parents were born in Russia; (c) Beckie (Becca Hyner) born Russia, age 33 → birth year ~1887, perfectly consistent with Akta 48 (Riwka Markus, born Suwałki 1887); (d) husband 'Ben Hyner' born ~1886 Russia, arrived 1902 — this is Benjamin Honkofsky (married Beckie in Brooklyn, May 1907) who had Americanized his surname to 'Hyner' by 1920. NOTE ON SURNAME CHANGE: 'Honkofsky' → 'Hyner' is a substantial change — possible that Honkofsky reverted to or adopted a variant of an original Ashkenazi surname; the connection between 'Hyner' and 'Honkofsky' should be documented with supporting evidence."},{"date":"2026-05-23","topic":"Next steps — UPDATED 2026-05-23","note":"Ship manifest search: Steve Morse White form (all ports, 1900-1915) exhausted for 'Dora*'/'Dvorah*'/'Deborah*' + 'Abramow*' — all candidates evaluated and rejected. 'Dora Marcus/Markus' also returned no matches. REMAINING MANIFEST STRATEGIES: (1) Try 'D*' + 'Abramow*' with town of origin = Suwalki on Steve Morse White form; (2) Search JewishGen EIDB for Abramowitz/Markus from Suwałki; (3) Search Boston HIAS/Canadian ports (Quebec, Halifax) — these are not in the Steve Morse White form index; (4) Manifest may be missing from index — search microfilm directly via NARA T715 (Ellis Island 1897-1957) browse. CENSUS/VITAL RECORDS REMAINING: (1) Search 1905 NY State Census for 'Becca Honkofsky' or 'Becca Marcus' in Brooklyn — Beckie married Ben in 1907, so in 1905 she may have been a boarder or not yet arrived; (2) Search 1910 US Federal Census for the Honkofsky/Hyner household — should show Beckie's immigration year and early children; (3) Search for death record for Dora Marcus / Dora Hyner in Brooklyn — she was born ~1860 and widowed by 1920, likely died 1920s-1940s; (4) Search for death record for Yakov/Jacob Markus — died before 1920, likely in Brooklyn. DOCUMENTS: (1) Order certified copy of NYC Marriage Certificate 5761 (Kings, 1907) to read bride's father's first name clearly; (2) Order high-resolution scan of Suwalki PSA Akta 48 to confirm mother's name."}],"rejected_records":[{"description":"Multiple 'Dora Marcus' results in Steve Morse Ellis Island Gold form (1906-1910), female — all ages 11 and 18, far too young for a woman born ~1860","status":"rejected","date":"2026-05-21"},{"description":"Philadelphia 1913, SS Haverford (Liverpool→Philadelphia, arrived ~Nov 1913) — Dora Abramowitz, age 50, female, married, Tailoress, Russia/Hebrew. FamilySearch ARK 1:1:2379-6PB (indexed) / image 3:1:33SQ-GP1Z-S35V (image 490 of 1230, NARA T840 Roll 122, Vol. 193-194). Traveling with companion Wolf Abramowitz, age 16, male, single, Sailor (likely a son born ~1897).","status":"rejected","date":"2026-05-22","reasons_for_rejection":["Final destination: Md./Baltimore — our Dora was settled in Brooklyn, NY (Beckie married there in 1907; Dora living with Beckie in Brooklyn per 1920 census). Baltimore destination is inconsistent.","Last permanent residence: England/Leeds (manifest indicates approximately 6 years in Leeds) — our Dora was from Suwałki, Russia. A Suwałki-origin immigrant would typically show a Russian town, not an English city, as last permanent residence.","Nearest relative in origin country: 'Daughter to Abramowitz, 18 Rushworth St., Leeds' — the person left behind in England is a daughter at a Leeds address. Our Dora's daughter Beckie was in Brooklyn, NY, not Leeds.","5-year immigration date discrepancy: 1920 US Census states Dora's immigration year as 1908; this manifest is November 1913. A 5-year error in the census is possible but large, and taken together with the other mismatches argues against this being the same person."],"alternative_scenario_considered":"Could Dora have emigrated Suwałki → Leeds (~1907) → Baltimore (1913) → Brooklyn? Theoretically possible (Leeds was a common Jewish settlement city in England), but the 'daughter in Leeds' contact and Baltimore destination both contradict known facts about our Dora. Not pursued further absent new evidence."},{"description":"Baltimore 1907 — Dora Abramowicz, age 16 (born ~1891), ship Köln — FamilySearch ARKs 1:1:2CS2-R6V and 1:1:2CS2-RDV (same person, two index entries). Hard reject: ~30 years too young for our Dora (b. ~1860).","status":"rejected","date":"2026-05-22"},{"description":"NY State Census 1915 — Dora Abramowitz, age 60 (born ~1855), Female, Boarder in household of Ethel Cooper (head, F, 24) and Max Cooper (M, 6). House No. 112, Page 09, Line 13, New York County (Manhattan). FamilySearch ARK 1:1:K925-B4K. Original image on Ancestry.com (paywalled).","status":"rejected","date":"2026-05-23","reasons_for_rejection":["Surname indexed as 'Abramowitz' — our Dora was married to Markus by at least 1887 (Akta 48) and would have been listed as 'Marcus' by 1915; she appears as 'Marcus' in the 1920 federal census.","Location: New York County (Manhattan) — our Dora was in Brooklyn (Kings County) per the 1920 census, living with daughter Beckie Honkofsky.","Household: boarding with Ethel Cooper (F, 24) and Max Cooper (M, 6) — no connection to Marcus, Honkofsky, or Abramowitz family members visible in household.","Age 60 in 1915 implies birth ~1855 — slightly older than our estimate (~1860), though within census rounding range. Not determinative on its own, but adds to cumulative mismatch."],"note":"Original image paywalled on Ancestry; could not confirm street name, ward, or nativity fields. Soft rejection — could theoretically be reconsidered if Ancestry image shows Suwałki birthplace and a connection to the Marcus/Honkofsky family is identified, but indexed data makes this unlikely."}],"last_updated":"2026-05-23","familysearch_tree_id":"GLVT-1K2","generation":4},"I6000000043711578108":{"id":"I6000000043711578108","gedcom_xref":"@I6000000043711578108@","schema_version":1,"names":["Irving Hyner"],"sex":"M","relationships":{"parents":[{"id":"I6000000043680860536","name":"Benjamin Hiner"},{"id":"I6000000043681164143","name":"Beckie Marcus"}],"spouses":[{"id":"I6000000043681525821","name":"Ida Flaxman"}],"children":[{"id":"I6000000001814601273","name":"Barry A Hyner"}]},"facts":[{"field":"birth","date":"17 NOV 1916","place":"New York, United States","status":"established","source":"GEDCOM export (Geni.com)","date_added":"2026-05-20","url":"https://www.geni.com/people/Irving-Hyner/6000000043711578108"},{"field":"death","date":" Ginkovskiy (Russian has no H sound; G/Г substitutes). On his son Benjamin's 1907 marriage certificate it appears as 'Honkofsky'; on Isidore's 1925 marriage certificate the father is listed as 'Milton Hyner' (severe garbling by that point).","original_surname":"Hynkavsky / Ginkovskiy (Russian form)","sex":"M","relationships":{"parents":[{"id":null,"name":"Osher Itsko Ginkovskiy (probable)","birth_year_approx":1846,"place":"Golynka, Slonim, Grodno","note":"Probable father — listed in 1858 10th Revision List (NHABGrodno/24/7/478, p.25v) as son of Iosel' Ginkovskiy, b. ~1846. 'Itsko' as a middle name suggests he was named for a grandfather Yitzhak. Michael would have been born ~1848–1858 to Osher Itsko, consistent with Benjamin b. 1883 being Osher's grandson."}],"spouses":[{"id":"I6000000043715501935","name":"Goldie (Gussie) Litcofsky","note":"Married in Slonim area, Russia Empire, date unknown. Both from Golynka — they were neighbors before marriage."}],"children":[{"id":"I6000000043680860536","name":"Benjamin Hiner (b. 1883/1884, Slonim)"},{"id":null,"name":"Isidor Hyner (b. 20 Dec 1888, Slonim)"},{"id":null,"name":"Celie Hyner Ruderman (b. ~1892, Russia)"},{"id":null,"name":"Morris 'Moe' Hyner (b. 30 May 1895, Slonim)"}]},"facts":[{"field":"birth","date":"circa 1848–1858","place":"Golynka (Holinka), Slonim District, Grodno Gubernia, Russian Empire (now Belarus)","place_note":"Golynka confirmed as the Hynkavsky family home village — Benjamin's 1904 ship manifest lists last residence as 'Holenko' (= Golynka/Holinka). The Ginkovskiy family appears in the 1858 revision list for Golynka (NHABGrodno/24/7/478).","status":"probable","source":"Inferred from children's birth dates (eldest Benjamin b. 1883), ship manifest last residence, and 1858 revision list placing Ginkovskiy family in Golynka","date_added":"2026-05-28"},{"field":"occupation","value":"Carpenter","status":"established","source":"GEDCOM export (Geni.com); consistent with son Benjamin also being a carpenter","date_added":"2026-05-20","url":"https://www.geni.com/people/Michael-Hiner/6000000043715363867"},{"field":"death","date":"before 1904","place":"Slonim, Grodno Gubernia, Russian Empire (probable)","status":"probable","note":"Michael never emigrated to the United States. No US records found under any spelling variant of Hynkavsky/Ginkovskiy/Hinkofsky. Gussie appears as a widow in all US records. He most likely died in Slonim before Benjamin emigrated in January 1904, or possibly before the family began emigrating at all.","date_added":"2026-05-28"}],"old_country_ancestors":{"note":"Confirmed via JewishGen Belarus Database 1858 10th Revision List, NHABGrodno/24/7/478, page 25v. Both the Ginkovskiy (Hynkavsky) and Lidkovskiy (Litcofsky) families appear in the SAME archive file, both in Golynka village — Michael and Gussie grew up as neighbors.","paternal_great_grandfather":{"name":"Movsha Ginkovskiy","place":"Golynka, Slonim, Grodno","note":"Father of Iosel'. Born est. 1790s–1800s."},"paternal_grandfather":{"name":"Iosel' Ginkovskiy","birth_year_approx":1826,"place":"Golynka, Slonim, Grodno","note":"Son of Movsha. Head of household in 1858 10th Revision List, NHABGrodno/24/7/478, p.25v. 'Iosel'' = Yiddish Yossel = Joseph."},"probable_father":{"name":"Osher Itsko Ginkovskiy","birth_year_approx":1846,"place":"Golynka, Slonim, Grodno","note":"Son of Iosel'. Listed in same 1858 revision entry. 'Osher' = Asher. Middle name 'Itsko' suggests named for a paternal grandfather Yitzhak."}},"surname_phonetics":{"original":"Hynkavsky (Hynkovsky)","russian_form":"Гинковский (Ginkovskiy)","explanation":"Russian has no H sound. The Cyrillic Г (G) substitutes for Hy-. The English spelling 'Hynkavsky' represents the Yiddish/Belarusian pronunciation of the surname. Variant spellings in US records: Honkofsky (Benjamin's 1907 marriage cert), Yankofsky/Yankowsky (Benjamin's ship manifest — indexer mishearing), Milton/Hyner (Isidore's 1925 marriage cert — extreme garbling). The surname was likely abandoned entirely by the American-born generation in favor of 'Hyner.'","known_variants":["Hynkavsky","Hinkavsky","Hynkovsky","Honkofsky","Yankowsky (manifest indexing error)","Ginkovskiy (Russian)","Hyner (Americanized)"]},"research_notes":[{"date":"2026-05-20","note":"Original dossier from GEDCOM — only birthplace 'Russia' and occupation 'Carpenter' were known. FamilySearch link in Geni notes (ark:/61903/1:1:2W2C-G4G) appears to point to a FamilySearch record — possibly shared with Benjamin's death record entry."},{"date":"2026-05-28","note":"Major update from JewishGen Belarus Database research. The Ginkovskiy family confirmed in Golynka, Slonim, via 1858 10th Revision List (NHABGrodno/24/7/478, p.25v). Family line: Movsha → Iosel' (b. ~1826) → Osher Itsko (b. ~1846) → Michael/Meilech → Benjamin (b. 1883). Note: the generational step from Osher Itsko to Michael is inferred, not directly documented. An archive document order from NHABGrodno could potentially confirm it."},{"date":"2026-05-28","note":"Michael never emigrated. All children emigrated to Brooklyn. Gussie is always listed as a widow in US records (1915, 1920 censuses). Most likely died in Slonim before 1904. If he survived into the early Soviet period, he would have been in the Slonim Jewish community that was liquidated in September 1942 (Slonim massacre — approx. 9,000 Jews killed)."},{"date":"2026-05-28","note":"Surname documentation: Benjamin's 1907 NYC marriage certificate names groom's father as 'Michel Honkofsky' — this is the clearest US-record confirmation of Michael's first name and surname. Isidore's 1925 marriage certificate lists father as 'Milton Hyner' — by that point Isidore was using 'Hyner' and mis-remembered/transliterated the Yiddish Meilech as Milton."}],"jri_poland_result":{"retrieved":"2026-05-28","search":"Hynkavsky, phonetic (Beider-Morse), Grodno Gubernia","result":"1 hit returned: ACKOWSKI, Elia Lejb, born 1866, Białystok, Grodno Gubernia, Type B (Birth), Akta 210, father Tewia, microfilm 1191933.","conclusion":"FALSE MATCH. ACKOWSKI is an unrelated family; matched via loose phonetic equivalence only. No actual Hynkavsky/Ginkovskiy records indexed in JRI-Poland for Grodno Gubernia. The Slonim/Golynka area metrical books have NOT been fully indexed by JRI-Poland — records must be sought directly from NHABGrodno."},"pending_research":["NHABGrodno/24/7/478, p.25v — order original 1858 revision list image to confirm full Ginkovskiy household and verify Osher Itsko as father of Michael","Slonim metrical books (NHABGrodno Fond 1) — search for birth record of Michael/Meilech Hynkavsky (~1848–1858). NOT yet indexed by JRI-Poland.","Slonim metrical books — search for marriage record of Michael Hynkavsky + Golda Litcofsky","Belarus GenWeb / JewishGen Belarus SIG document ordering — request copies of NHABGrodno pages directly from the archive"],"last_updated":"2026-05-28","generation":4},"I6000000043715501935":{"id":"I6000000043715501935","gedcom_xref":"@I6000000043715501935@","schema_version":1,"names":["Goldie Litcofsky","Gussie Litcofsky","Goldie Hyner","Gussie Hyner","Gussie Hiner"],"surname_variants":["Litcofsky","Litkowsky","Litkofsky","Lidkovskaya (Russian fem. form)","Lidkovskiy (Russian surname root)"],"nickname":"Gussie","sex":"F","relationships":{"parents":[{"id":null,"name":"Itsko (Isaac) Lidkovskiy","note":"Confirmed — named on 1858 10th Revision List (NHABGrodno/24/7/478, p.242v) and as father on birth record of her brother Borukh (NHABGrodno/1/28/034). Death certificate lists father as 'Isaac Mitkows[ky]' — informant Isidore garbled the surname."},{"id":null,"name":"Rokhlya (Rachel)","note":"Confirmed — listed as mother on birth record of Gussie's brother Borukh Lidkovskiy (NHABGrodno/1/28/034, p.848481). Maiden surname unknown."}],"spouses":[{"id":"I6000000043715363867","name":"Michael Hiner (Meilech Hynkavsky)","note":"Carpenter. Never emigrated — almost certainly died in Slonim. No US records found for him. Confirmed as father via Benjamin's 1907 marriage certificate ('Michel Honkofsky') and Isidore's 1925 marriage certificate ('Milton' Hyner)."}],"children":[{"id":"I6000000043680860536","name":"Benjamin Hiner (b. 1883/1884, Slonim)"},{"id":null,"name":"Isidor Hyner (b. 20 Dec 1888, Slonim)"},{"id":null,"name":"Celie Hyner Ruderman (b. ~1892, Russia)"},{"id":null,"name":"Morris 'Moe' Hyner (b. 30 May 1895, Slonim)"}],"known_siblings":[{"name":"Borukh (Baruch) Lidkovskiy","birth_date":"2 September 1852","birth_place":"Golynka, Slonim, Grodno","note":"Confirmed sibling — same father (Itsko) and mother (Rokhlya) on birth record NHABGrodno/1/28/034, p.848481. Born ~1 year after Gussie. Did not emigrate."},{"name":"Aizik (Isaac) Litkovski","note":"Probable sibling — listed as son of Itsko, residing in Slonim, in 1912 Grodno Gubernia Voters List (ID SLOa0476). Still in Slonim 1912. Did not emigrate. Likely perished in Holocaust (Slonim massacre September 1942)."},{"name":"Samuel Litcofsky (~1848)","note":"UNCONFIRMED possible sibling — WikiTree profile Litcofsky-16. Right age to be Gussie's sibling. Needs census birthplace confirmation."}]},"facts":[{"field":"birth","date":"circa 1851","date_basis":"Age 76 at death (7 May 1927) → birth ~1851","place":"Golynka (Holinka), Slonim District, Grodno Gubernia, Russian Empire (now Belarus)","place_note":"Golynka confirmed as family home town from 1858 revision list and 1852 birth record of her brother Borukh. Same village as her future husband Michael Hynkavsky.","status":"established","source":"NYC Death Certificate Reg No. 3460 (age at death); JewishGen Belarus Database 1858 revision list NHABGrodno/24/7/478; birth record of sibling NHABGrodno/1/28/034","date_added":"2026-05-20","date_updated":"2026-05-28","url":"https://a860-historicalvitalrecords.nyc.gov/search#"},{"field":"parents_old_country","summary":"Father: Itsko (Isaac) Lidkovskiy, b. ~1823, Golynka. Grandfather: Khaim Lidkovskiy. Mother: Rokhlya (Rachel), maiden surname unknown.","archive d. FamilySearch 'Brazil Immigration Cards, 1900-1965' not yet searched. Naturalization petition confirms last port of departure was Rio de Janeiro, Brazil."},{"field":"immigration_us","value":"Arrived New York from Rio de Janeiro, Brazil, June 25 1915 aboard SS São Paulo","date":"25 JUN 1915","place":"Port of New York (Ellis Island), New York, United States","status":"established","source":"Declaration of Intention 1919 ark:/61903/1:1:6G6J-6LTV; Certificate of Arrival embedded in naturalization file; Petition for Naturalization 1926 ark:/61903/1:1:6G8V-GMXP; 1920 Census ark:/61903/1:1:MJGK-NKX (arrival year 1915)","date_added":"2026-05-24","note":"Ship: SS São Paulo (Brazilian liner, Rio de Janeiro – New York route). Certificate of Arrival reads 'Flaxman, Mordche' confirming Yiddish form of Mordechai used on immigration documents. Arrival year 1915 confirmed by three independent records (DoI, Certificate of Arrival, 1920 census). Family tradition of '1913' arrival is incorrect — likely reflects Brazil arrival date (~1912-1913). Ship manifest for SS São Paulo, June 25 1915 not yet located on FamilySearch (pending search).","url":"https://www.familysearch.org/ark:/61903/1:1:6G6J-6LTV"},{"field":"declaration_of_intention","value":"First Papers filed December 17, 1919, Bronx, New York","date":"17 DEC 1919","place":"Bronx, New York, United States","status":"established","source":"Declaration of Intention, FamilySearch ark:/61903/1:1:6G6J-6LTV (image: ark:/61903/3:1:3Q9M-CSMP-FQKW-4, cc=2060123)","date_added":"2026-05-24","needs_review":true,"image_url":"https://www.familysearch.org/ark:/61903/3:1:3Q9M-CSMP-FQKW-4?view=index&personArk=%2Fark%3A%2F61903%2F1%3A1%3A6G6J-6LTV&action=view&cc=2060123","note":"Birth city field on the Declaration of Intention is a handwritten word (~4-5 letters, possibly starting with K) too small to read at available scan resolution. Needs high-resolution review. Birthplace at top of DoI reads 'Russia' at country level. Arrival date on DoI confi let currentId = null;

window.addEventListener('DOMContentLoaded', () => {
  renderSidebar(allPeople);
});

// ── Sidebar ───────────────────────────────────────────────────────────────────
const genLabel = g => {
  const labels = {
    0:'You', 1:'Parents', 2:'Grandparents',
    3:'Great-Grandparents', 4:'2× Great-Grandparents',
    5:'3× Great-Grandparents', 6:'4× Great-Grandparents', 99:'Other Relatives'
  };
  return (labels[g] || `Gen ${g}`) + (g > 0 && g < 99 ? ` (Gen ${g})` : '');
};

function renderSidebar(people) {
  const byGen = {};
  for (const p of people) {
    const g = p.generation ?? 99;
    if (!byGen[g]) byGen[g] = [];
    byGen[g].push(p);
  }
  const gens = Object.keys(byGen).map(Number).sort((a,b) => a-b);
  let html = '';
  for (const g of gens) {
    html += `<div class="gen-header">${genLabel(g)}</div>`;
    for (const p of byGen[g]) {
      const d = dossiers[p.id];
      const birth = d?.facts?.find(f => f.field==='birth')?.date || p.birth || '';
      const death = d?.facts?.find(f => f.field==='death')?.date || '';
      const dates = [birth, death].filter(Boolean).join(' – ') || '—';
      html += `<div class="person-item${currentId===p.id?' active':''}" onclick="showDossier('${p.id}')">
        <div class="pi-name">${esc(p.name || p.id)}</div>
        <div class="pi-dates">${esc(dates)}</div>
      </div>`;
    }
  }
  document.getElementById('sidebar-list').innerHTML = html;
}

function filterSidebar(q) {
  const lq = q.toLowerCase();
  const filtered = lq
    ? allPeople.filter(p => p.name?.toLowerCase().includes(lq) ||
        dossiers[p.id]?.names?.some(n => n.toLowerCase().includes(lq)))
    : allPeople;
  renderSidebar(filtered);
}

// ── Dossier view ──────────────────────────────────────────────────────────────
function showDossier(id) {
  currentId = id;
  // Update active state in sidebar
  document.querySelectorAll('.person-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.person-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(id)) el.classList.add('active');
  });
  const d = dossiers[id];
  if (!d) { setMain('<div class="no-sel"><h3>Dossier not found</h3></div>'); return; }
  setMain(renderDossier(d));
}

function setMain(html) {
  document.getElementById('main').innerHTML = html;
}

function renderDossier(d) {
  const name  = d.names?.[0] || d.id;
  const akas  = (d.names||[]).slice(1);
  const birth = d.facts?.find(f => f.field==='birth');
  const death = d.facts?.find(f => f.field==='death');
  const immig = d.facts?.find(f => f.field==='immigration');
  const occ   = d.facts?.find(f => f.field==='occupation');

  let html = `<div class="card">
    <div class="dos-name">${esc(name)}</div>
    ${akas.length ? `<div class="dos-aka">Also known as: ${akas.map(esc).join(', ')}</div>` : ''}
    <div class="dos-meta">
      ${d.sex ? `<span class="badge badge-${d.sex}">${d.sex==='M'?'Male':'Female'}</span>` : ''}
      ${d.generation != null ? `<span class="badge badge-gen">Gen ${d.generation}</span>` : ''}
    </div>
  </div>`;

  // Quick facts
  html += `<div class="card"><div class="section-title">At a Glance</div>
    <div class="quick-facts">`;
  if (birth) html += `<div><div class="qf-label">Born</div><div class="qf-val">${esc(birth.date||'—')}</div><div class="qf-sub">${esc(birth.place||'')}</div></div>`;
  if (death) html += `<div><div class="qf-label">Died</div><div class="qf-val">${esc(death.date||'—')}</div><div class="qf-sub">${esc(death.place||'')}</div></div>`;
  if (immig) html += `<div><div class="qf-label">Immigrated</div><div class="qf-val">${esc(immig.date||'—')}</div></div>`;
  if (occ)   html += `<div><div class="qf-label">Occupation</div><div class="qf-val">${esc(occ.value||occ.note||'—')}</div></div>`;
  html += `</div></div>`;

  // Family
  const rels = d.relationships || {};
  const famEntries = [
    ...((rels.parents||[]).map(r => ({...r, role:'Parent'}))),
    ...((rels.spouses||[]).map(r => ({...r, role:'Spouse'}))),
    ...((rels.children||[]).map(r => ({...r, role:'Child'}))),
  ];
  if (famEntries.length) {
    html += `<div class="card"><div class="section-title">Family</div><div class="family-grid">`;
    for (const r of famEntries) {
      const rel = dossiers[r.id];
      const rb = rel?.facts?.find(f=>f.field==='birth')?.date || '';
      const rd = rel?.facts?.find(f=>f.field==='death')?.date || '';
      const rdates = [rb,rd].filter(Boolean).join(' – ');
      const clickable = !!rel;
      html += `<div class="fam-card ${clickable?'clickable':'no-link'}" ${clickable?`onclick="showDossier('${r.id}')"`:''} >
        <div class="fam-role">${esc(r.role)}</div>
        <div class="fam-name">${esc(r.name||r.id)}</div>
        ${rdates ? `<div class="fam-dates">${esc(rdates)}</div>` : ''}
      </div>`;
    }
    html += `</div></div>`;
  }

  // FamilySearch profile link
  if (d.familysearch_profile_url) {
    html += `<div class="card" style="padding:14px 22px;">
      <a class="fs-link" href="${esc(d.familysearch_profile_url)}" target="_blank">
        ↗ View on FamilySearch Family Tree
      </a>
    </div>`;
  }

  // Facts table
  if (d.facts?.length) {
    html += `<div class="card"><div class="section-title">Documented Facts (${d.facts.length})</div>
      <table class="facts-table">
        <thead><tr><th style="width:140px;">Event</th><th>Details</th></tr></thead><tbody>`;
    for (const f of d.facts) {
      const statusBadge = f.status && f.status !== 'established'
        ? ` <span class="badge badge-${f.status}" style="font-size:10px;padding:1px 6px;">${f.status}</span>` : '';
      html += `<tr>
        <td><span class="fact-field">${esc(fieldLabel(f.field))}${statusBadge}</span></td>
        <td>${renderFactDetail(f)}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // Research notes
  if (d.research_notes?.length) {
    html += `<div class="card"><div class="section-title">Research Notes</div>`;
    for (const n of d.research_notes) {
      const when = n.date || n.session || '';
      const text = n.summary || n.note || n.text || '';
      html += `<div class="note-card">
        ${when ? `<div class="note-date">${esc(when)}${n.session&&n.date?' · '+esc(n.session):''}</div>` : ''}
        <div class="note-text">${esc(text)}</div>
      </div>`;
    }
    html += `</div>`;
  }

  return html;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fieldLabel(f) {
  const map = {
    birth:'Birth', death:'Death', burial:'Burial', residence:'Residence',
    immigration:'Immigration', immigration_manifest_candidate:'Ship Manifest (candidate)',
    naturalization:'Naturalization', naturalization_declaration:'Naturalization — Declaration',
    naturalization_declaration_1917:'Naturalization — Declaration 1917',
    naturalization_declaration_1941:'Naturalization — Declaration 1941',
    naturalization_petition_1941:'Naturalization — Petition 1941',
    naturalization_index_eastern_district:'Naturalization — Eastern District Index',
    naturalization_final_1943_1944:'Naturalization — Final 1943–44',
    naturalization_petition:'Naturalization — Petition',
    naturalization_final:'Naturalization — Final',
    occupation:'Occupation', marriage:'Marriage', divorce:'Divorce',
    census_1900:'1900 Census', census_1905:'1905 Census',
    census_1910:'1910 Census', census_1915_ny_state:'1915 NY State Census',
    census_1920:'1920 Census', census_1925_ny_state:'1925 NY State Census',
    census_1930:'1930 Census', census_1940:'1940 Census',
    wwi_draft_registration:'WWI Draft Registration',
    wwii_draft_card:'WWII Draft Card',
    declaration_of_intention:'Declaration of Intention',
    numident:'NUMIDENT (SSA)',
    child_birth_record:'Child Birth Record',
    parents_old_country:'Parents (Old Country)',
    father_hebrew_name:'Father — Hebrew Name',
    scholarly_title:'Scholarly Title',
    wife_name_variant:'Wife Name Variant',
    immigration_brazil:'Immigration — Brazil',
    immigration_us:'Immigration — US',
    marital_status:'Marital Status',
  };
  return map[f] || (f||'').replace(/_/g,' ').replace(/\b./g,c=>c.toUpperCase());
}

function renderFactDetail(f) {
  const parts = [];
  if (f.date)   parts.push(`<strong>${esc(f.date)}</strong>${f.date_alt ? ` <span style="color:#9a8070;font-size:11px;">(alt: ${esc(f.date_alt)})</span>` : ''}`);
  if (f.place)  parts.push(`📍 ${esc(f.place)}${f.place_note ? `<div class="fact-note">${esc(f.place_note)}</div>` : ''}`);
  if (f.value)  parts.push(`<strong>${esc(f.value)}</strong>`);
  if (f.ship)   parts.push(`🚢 ${esc(f.ship)}${f.departure_port ? ` from ${esc(f.departure_port)}` : ''}`);
  if (f.manifest_name) parts.push(`Manifest name: <em>${esc(f.manifest_name)}</em>`);
  if (f.passenger_id)  parts.push(`Passenger ID: ${esc(f.passenger_id)}${f.image_reference ? ` · Image: ${esc(f.image_reference)}` : ''}`);
  if (f.spouse) parts.push(`Spouse: ${esc(f.spouse)}`);
  if (f.certificate_number) parts.push(`Cert #${esc(f.certificate_number)}${f.certificate_id ? ` (${esc(f.certificate_id)})` : ''}`);
  if (f.ceremony_location)  parts.push(`Location: ${esc(f.ceremony_location)}`);
  if (f.note)   parts.push(`<div class="fact-note">${esc(f.note)}</div>`);
  if (f.source) {
    const srcHtml = f.url
      ? `<div class="fact-source">Source: ${esc(f.source)} <a class="fact-doc-link" href="${esc(f.url)}" target="_blank" title="Open source document">↗ View document</a></div>`
      : `<div class="fact-source">Source: ${esc(f.source)}</div>`;
    parts.push(srcHtml);
  }
  if (f.ark)    parts.push(`<a class="fact-ark" href="https://www.familysearch.org/ark:/${encodeURIComponent(f.ark.replace('ark:/',''))}" target="_blank">↗ ${esc(f.ark)}</a>`);
  if (f.statueofliberty_url) parts.push(`<a class="fact-link" href="${esc(f.statueofliberty_url)}" target="_blank">↗ Statue of Liberty record</a>`);
  if (f.familysearch_profile_url) parts.push(`<a class="fact-link" href="${esc(f.familysearch_profile_url)}" target="_blank">↗ FamilySearch</a>`);
  return parts.join('<br>') || '<span style="color:#9a8070;">—</span>';
}
</script>
